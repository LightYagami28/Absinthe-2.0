name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y gcc-multilib libbz2-dev autoconf automake

      - name: Bootstrap
        run: ./autogen.sh

      - name: Configure
        run: ./configure

      - name: Build
        run: make

      - name: Package
        run: |
          VERSION=${GITHUB_REF_NAME}
          PKGNAME="absinthe-${VERSION}-linux-x86"
          mkdir -p dist/${PKGNAME}
          cp src/absinthe dist/${PKGNAME}/
          cp -r data dist/${PKGNAME}/
          cp README.md BUILDING.md LICENSE dist/${PKGNAME}/
          tar -czf dist/${PKGNAME}.tar.gz -C dist ${PKGNAME}
          echo "PACKAGE=dist/${PKGNAME}.tar.gz" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.PACKAGE }}
          generate_release_notes: true
